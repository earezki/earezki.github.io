name: Build & Publish (Astro -> gh-pages)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

env:
  NODE_VERSION: 20
  DIST_DIR: dist
  PUBLISH_BRANCH: gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install system dependencies for image optimization
        run: |
          sudo apt-get update
          sudo apt-get install -y libpng-dev libjpeg-dev

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit updated cache to master
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cache/
          git diff --staged --quiet || git commit -m "chore: update cache [skip ci]"
          git push origin master || echo "No cache changes to commit"

      - name: Copy CNAME
        run: |
          if [ -f public/CNAME ]; then cp public/CNAME $DIST_DIR/CNAME; fi

      - name: Verify dist not empty
        run: |
          if [ ! -d "$DIST_DIR" ] || [ -z "$(ls -A $DIST_DIR)" ]; then echo "dist empty"; ls -al; exit 1; fi
          echo "Dist content:"; ls -al $DIST_DIR | head -40

      - name: Publish
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.DIST_DIR }}
          publish_branch: ${{ env.PUBLISH_BRANCH }}
          enable_jekyll: false
          commit_message: "deploy: ${GITHUB_SHA}"

      - name: Cleanup old deployments
        uses: actions/github-script@v7
        with:
          script: |
            const deployments = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: 'github-pages',
              per_page: 100
            });
            
            console.log(`Found ${deployments.data.length} total deployments`);
            
            // Keep only the 5 most recent deployments
            const toDelete = deployments.data.slice(5);
            
            console.log(`Will delete ${toDelete.length} old deployments`);
            
            for (const deployment of toDelete) {
              try {
                // set deployment to inactive
                await github.rest.repos.createDeploymentStatus({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id,
                  state: 'inactive'
                });
                
                await github.rest.repos.deleteDeployment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id
                });
                
                console.log(`✓ Deleted deployment ${deployment.id}`);
              } catch (error) {
                console.log(`✗ Could not delete deployment ${deployment.id}: ${error.message}`);
              }
            }
            
            console.log(`Kept ${Math.min(5, deployments.data.length)} most recent deployments`);

      - name: Summary
        run: echo "Published dist to $PUBLISH_BRANCH" >> $GITHUB_STEP_SUMMARY